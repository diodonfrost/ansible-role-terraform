---
# tasks file for install terraform on Linux and Unix system

- name: Linux/Unix | Find all versions of Terraform
  ansible.builtin.uri:
    url: https://releases.hashicorp.com/terraform/index.json
    return_content: true
  register: terraform_index
  when: terraform_version == "latest"
  check_mode: false

- name: Linux/Unix | Finds the latest Terraform version when latest var is define
  ansible.builtin.set_fact:
    _terraform_version: "{{ (terraform_index.content | from_json).versions | reject('search', '-') | list | sort_versions | last }}"
  when: terraform_version == 'latest'

- name: Linux/Unix | Use the specified Terraform version when latest var is not define
  ansible.builtin.set_fact:
    _terraform_version: "{{ terraform_version }}"
  when: terraform_version != 'latest'

# This task avoids downloading Terraform every time
- name: Linux/Unix | Check if Terraform is present with the right version
  ansible.builtin.command: "{{ terraform_path }}/terraform -version"
  register: terraform_installed_version
  ignore_errors: true
  changed_when: false
  failed_when: false

- name: Linux/Unix | Download Terraform archive
  ansible.builtin.get_url:
    url: "{{ terraform_pkg_url }}"
    dest: "/tmp/terraform_{{ _terraform_version }}_linux_{{ _base_arch[ansible_facts['architecture']] | default('amd64') }}.zip"
    checksum: "{{ ('sha256:' + terraform_checksum_url) if terraform_checksum_verify else omit }}"
    mode: '0644'
  check_mode: false
  when: _terraform_version not in ( terraform_installed_version.stdout_lines | default(['empty'], true) | first )

- name: Linux/Unix | Install Terraform
  ansible.builtin.unarchive:
    src: "/tmp/terraform_{{ _terraform_version }}_linux_{{ _base_arch[ansible_facts['architecture']] | default('amd64') }}.zip"
    dest: "{{ terraform_path }}"
    remote_src: true
  when: _terraform_version not in ( terraform_installed_version.stdout_lines | default(['empty'], true) | first )
